spring.application.name=simplified-banking

spring.datasource.url=jdbc:h2:mem:banking-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# to view H2 console
spring.h2.console.enabled=true

authorize.transaction.url=${AUTHORIZE_TRANSACTION_SERVICE_URL:https://util.devi.tools/api/v2/authorize}
send.email.url=${SEND_EMAIL_SERVICE_URL:https://util.devi.tools/api/v1/notify}
